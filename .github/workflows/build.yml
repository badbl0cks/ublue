name: bluebuild
on:
  schedule:
    - cron:
        "00 10 * * SUN" # build at 10:00 UTC every Sunday (2:00 PST/3:00 PDT)
        # (ublue images start building daily @ 06:00 UTC [22:00 PST/23:00 PDT])
  push:
    paths-ignore:
      - "**.md"

  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - bazzite-gnome.yml
          - ucore-hci.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.12
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
