modules:
  - type: files
    files:
      - source: system/lib/firmware/
        destination: /lib/firmware/
  - type: files
    files:
      - source: system/etc/modprobe.d/
        destination: /etc/modprobe.d/
  - type: dnf
    repos:
      files:
        - https://packages.microsoft.com/yumrepos/vscode/config.repo
        - docker-ce.repo
        - https://copr.fedorainfracloud.org/coprs/lizardbyte/stable/repo/fedora-43/lizardbyte-stable-fedora-43.repo
      keys:
        - https://packages.microsoft.com/keys/microsoft.asc
        - https://download.docker.com/linux/fedora/gpg
        - https://download.copr.fedorainfracloud.org/results/lizardbyte/stable/pubkey.gpg
    group-install:
      with-optional: true
      packages:
        - development-tools
        - c-development
    install:
      packages:
        - vlc
        - mpv
        - mpv_inhibit_gnome
        - usbguard
        - android-tools
        - arm-image-installer
        - hunspell-devel
        - zsh
        - libvirt
        - virt-manager
        - autofs
        - gstreamer1-plugins-ugly-free
        - gstreamer1-plugins-bad-free
        - gstreamer1-plugins-bad-free-extras
        - gstreamer1-plugins-good
        - gstreamer1-plugins-good-extras
        - gstreamer1-plugins-base
        - gstreamer1-plugins-base-tools
        - wireguard-tools
        - trash-cli
        - git
        - git-credential-libsecret
        - git-filter-repo
        - gtk-murrine-engine
        - firewall-config
        - alsa-tools
        - libappstream-glib
        - htop
        - glances
        - ansible
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
        - gnome-boxes
        - code
        - freeipa-client
        - sunshine
        - chromium
        - chromium-headless
        - chromedriver
        - fedora-chromium-config-gnome
  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
        - Hack
        - SourceCodePro
        - Terminus
        - JetBrainsMono
        - NerdFontsSymbolsOnly
      google-fonts:
        - Roboto
        - Lexend
  - type: gnome-extensions
    install:
      - 6 # Applications Menu
      - 1460 # Vitals
      - 1160 # Dash to Panel
      - 97 # Coverflow Alt-Tab
      - 8671 # All-in-One Clipboard
      - 7856 # Mouse Tail
      - 8971 # Lock Guard
      - 4338 # Allow Locked Remote Desktop
      - 4548 # Tactile
      # Below are provided currently by Bazzite
      #- 615 # *AppIndicator and KStatusNotifierItem Support
      #- 8760 # *Add to Steam
      #- 3193 # *Blur my Shell
      #- 517 # *Caffeine
      #- 3740 # *Compiz alike magic lamp effect
      #- 3210 # *Compiz windows effect
      #- 7215 # *Restart To
      #- 19 # *User Themes
      #- 1319 # *GSConnect (Commented out as this extension will not work if installed system-wide without compile-time modifications, bazzite includes a modified version)
      #- 4451 # *Logo Menu (Commented out as Bazzite includes customizations with their install)
  - type: gschema-overrides
    include:
      - zz1-power-button-settings.gschema.override
  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        - net.nokyan.Resources
        - org.gimp.GIMP
        - org.libreoffice.LibreOffice
        - page.codeberg.libre_menu_editor.LibreMenuEditor
        - us.zoom.Zoom
        - com.bitwarden.desktop
        - dev.zed.Zed
        - dev.goats.xivlauncher
        - com.github.zocker_160.SyncThingy
        - io.github.vikdevelop.SaveDesktop
        - md.obsidian.Obsidian
        - org.strawberrymusicplayer.strawberry
        - com.discordapp.Discord
        - com.borgbase.Vorta
        - org.mozilla.Thunderbird
        - io.gitlab.librewolf-community
        - io.github.ungoogled_software.ungoogled_chromium
      remove:
        - org.gnome.Boxes
        - org.videolan.VLC
    user:
      remove:
        - org.gnome.Boxes
        - org.videolan.VLC
  - type: systemd
    system:
      enabled:
        - docker.service
  - type: signing

