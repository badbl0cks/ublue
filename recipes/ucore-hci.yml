---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: ucore-hci-badblocks
description: Customizations of ucore for personal use

base-image: ghcr.io/ublue-os/ucore-hci
image-version: lts

modules:
  - from-file: base.yml
  - type: files
    files:
      - source: system_ucore-hci
        destination: /
  - type: dnf
    install:
      packages:
        - syncthing
        - distrobox
        - firewalld
        - ipset
  - type: systemd
    system:
      enabled:
        - syncthing.service
        - wg-quick@wg0.service
        - rpm-ostreed-automatic.timer
        - podman.socket
        - podman.service
        - signed-autorebase.service
        - firewalld.service
        - firstboot-etc.service
        - firstboot-syncthing.service
        - firstboot-wireguard@wg0.service
        - firstboot-firewall-ipsets.service
        - firstboot-hostiqo.service
        - hostiqo-distrobox.service
