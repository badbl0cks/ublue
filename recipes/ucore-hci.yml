---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: ucore-hci-badblocks
description: Customizations of ucore for personal use

base-image: ghcr.io/ublue-os/ucore-hci
image-version: lts

modules:
  - from-file: base.yml
  - type: files
    files:
      - source: hostname/ucore-hci
        destination: /etc
  - type: dnf
    install:
      packages:
        - syncthing
  - type: script
    scripts:
      - syncthing-setup.sh
  - type: systemd
    system:
      enabled:
        - syncthing@sync.service
